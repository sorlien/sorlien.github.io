<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amalia Sörlien — UX Portfolio</title>
<script>if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/dark-mode.css"><!-- DARK MODE: remove this line to disable -->
  <script>if (sessionStorage.getItem('anim-home-done')) document.documentElement.classList.add('js-skip-intro');</script>
  <style id="page-style">
    /* ── Hero section ───────────────────────────── */

    /* Tall enough to give 50vh of scroll travel.
       Sticky inner locks the visual stage to the viewport. */
    .hero {
      position: relative;
      height: 150vh;
      background-color: var(--color-white);
    }

    .hero__sticky {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
    }

    /* Nav — slides down from top */
    .nav--animate {
      top: calc(-1 * var(--nav-height) - 16px);
      opacity: 0;
      transition:
        top     0.7s var(--ease-back),
        opacity 0.4s ease;
    }

    .nav--visible {
      top: 16px !important;
      opacity: 1 !important;
    }

    /* PORTFOLIO watermark — sits behind all layers */
    .hero__watermark {
      position: absolute;
      top: 27%;
      left: 0;
      width: 100%;
      text-align: center;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Three-layer parallax stage ─────────────── */
    .hero__stage {
      position: absolute;
      inset: 0;
    }

    .hero__layer {
      position: absolute;
      inset: 0;
      will-change: transform;
    }

    .hero__layer img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: bottom center;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    /* Wide screens: contain images so they never exceed 100vh (white space on sides is fine) */
    @media (min-width: 1600px) {
      .hero__layer img {
        object-fit: contain;
      }
    }

    /* Mobile: override main.css rules that were written for the old hero layout */
    @media (max-width: 767px) {
      .hero         { height: 150vh !important; overflow: visible !important; }
      .hero__sticky { height: 100vh; }
      /* main.css forces watermark position:static on mobile (old layout) — restore absolute */
      .hero__watermark {
        position: absolute !important;
        top: calc(var(--nav-height) + 64px) !important;
        left: 0 !important;
        width: 100% !important;
        padding: 0 var(--content-indent) !important;
        display: block !important;
        font-size: calc((100vw - 2 * var(--content-indent)) * 0.34) !important;
        letter-spacing: 0 !important;
        text-align: center !important;
        margin-bottom: 0 !important;
        white-space: nowrap !important;
      }
    }

    /* Name, bg and fg start hidden — scroll reveals them */
    #heroLayerName,
    #heroLayerBg,
    #heroLayerFg {
      opacity: 0;
    }

    /* ── View projects button ────────────────────── */
    .hero__view-btn {
      position: absolute;
      bottom: 36px;
      left: 50%;
      z-index: 10;
      white-space: nowrap;
      pointer-events: none;
      text-decoration: none;
      opacity: 0;
    }

    /* ── Scroll hint ─────────────────────────────── */
    .hero__hint {
      position: absolute;
      bottom: 36px;
      left: 50%;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--color-black);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      opacity: 0;
      transform: translateX(-50%) translateY(20px);
      pointer-events: none;
    }

    .hero__hint svg {
      color: var(--color-white);
    }

    @keyframes hero-hint-bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(-8px); }
    }

  </style>
</head>
<body>

  <!-- ── Navigation ──────────────────────────────── -->
  <nav class="nav" id="siteNav">
    <a href="index.html" class="nav__logo" aria-label="Home">
      <img src="assets/images/as-logo.png" alt="AS">
    </a>
    <ul class="nav__links">
      <li><a href="index.html"   class="nav__link nav__link--active">Home</a></li>
      <li><a href="projects.html" class="nav__link">Projects</a></li>
      <li><a href="about.html"   class="nav__link">About</a></li>
      <li class="nav__theme-item"><button class="theme-toggle" aria-label="Toggle dark mode">
        <!-- Moon icon (shown in light mode) -->
        <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <!-- Sun icon (shown in dark mode) -->
        <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1"  x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22"   x2="5.64"  y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1"  y1="12" x2="3"  y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22"  y1="19.78" x2="5.64"  y2="18.36"/>
          <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
        </svg>
      </button></li>
    </ul>
    <button class="nav__hamburger" aria-label="Toggle menu" aria-expanded="false">
      <svg class="icon-open" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
      <svg class="icon-close" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </nav>

  <!-- ── Hero ────────────────────────────────────── -->
  <main>
    <section class="hero">
      <div class="hero__sticky">

        <!-- Watermark: scales up on load, exits on scroll -->
        <span class="watermark hero__watermark anim-scale-up" id="heroWatermark">PORTFOLIO</span>

        <!-- Four-layer composition -->
        <div class="hero__stage">

          <!-- Layer 0: name — bottom of stack, first to reveal on scroll -->
          <div class="hero__layer" id="heroLayerName">
            <img src="assets/images/hero_name.png" alt="">
          </div>

          <!-- Layer 1: background illustration elements -->
          <div class="hero__layer" id="heroLayerBg">
            <img src="assets/images/hero_background.png" alt="">
          </div>

          <!-- Layer 2: black and white photo -->
          <div class="hero__layer" id="heroLayerMid">
            <img src="assets/images/hero_middle.png" alt="">
          </div>

          <!-- Layer 3: illustrated figure -->
          <div class="hero__layer" id="heroLayerFg">
            <img src="assets/images/hero_foreground.png" alt="">
          </div>

        </div>

        <!-- View projects button: springs up after layers settle -->
        <a class="btn btn--primary hero__view-btn" id="heroViewBtn" href="projects.html">VIEW PROJECTS</a>

        <!-- Scroll hint: bouncing arrow, exits on scroll -->
        <div class="hero__hint" id="heroScrollHint">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>

      </div>
    </section>
  </main>

  <script src="js/dark-mode.js"></script><!-- DARK MODE: remove this line to disable -->
  <script src="js/nav-indicator.js"></script>
  <script src="js/nav-mobile.js"></script>
  <script src="js/hero-animation.js"></script>
  <script src="js/projects-data.js"></script>
  <script src="js/projects.js"></script>
  <script src="js/about-animation.js"></script>
  <script src="js/router.js"></script>
</body>
</html>
