<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amalia Sörlien — UX Portfolio</title>
<script>if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/dark-mode.css"><!-- DARK MODE: remove this line to disable -->
  <script>if (sessionStorage.getItem('anim-home-done')) document.documentElement.classList.add('js-skip-intro');</script>
  <style id="page-style">
    /* ── Hero section ───────────────────────────── */
    .hero {
      position: relative;
      height: 100vh;
      min-height: 832px;
      background-color: var(--color-white);
      /* No overflow: hidden — lets name and photo animate in from screen edges.
         Body has overflow-x: hidden to prevent scrollbar. */
    }

    .hero__inner {
      position: relative;
      height: 100%;
      overflow: visible; /* Override page-wrapper's overflow-x: hidden */
    }

    /* Nav — slides down from top using 'top' so translateX(-50%) centering is preserved */
    .nav--animate {
      top: calc(-1 * var(--nav-height));
      opacity: 0;
      transition:
        top     0.7s var(--ease-back),
        opacity 0.4s ease;
    }

    /* Applied by JS instead of .is-visible, to avoid transform: none conflict */
    .nav--visible {
      top: 0 !important;
      opacity: 1 !important;
    }

    /* Large faint "PORTFOLIO" watermark — grows from small with ease-back */
    .hero__watermark {
      position: absolute;
      top: 27%;
      left: 0;
      width: 100%;
      text-align: center;
    }

    /* "Amalia SÖRLIEN" — starts from left screen edge, glides in */
    .hero__name {
      position: absolute;
      top: 54%;
      left: var(--content-indent);
      font-family: var(--font-display);
      font-size: var(--text-h1);
      font-weight: 400;
      line-height: 1;
      color: var(--color-black);
      z-index: 1;
      transform: translateX(-100vw); /* Start fully off left edge */
      opacity: 0;
      transition:
        transform 1.1s var(--ease-gentle),
        opacity   0.9s var(--ease-gentle);
    }

    /* Photo — starts from right screen edge, glides in */
    .hero__photo {
      position: absolute;
      top: 139px;
      bottom: 0;
      right: 0;
      width: 52%;
      max-width: 666px;
      transform: translateX(100vw); /* Start fully off right edge */
      opacity: 0;
      transition:
        transform 1.1s var(--ease-gentle),
        opacity   0.9s var(--ease-gentle);
    }

    .hero__photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
    }
  </style>
</head>
<body>

  <!-- ── Navigation ──────────────────────────────── -->
  <nav class="nav" id="siteNav">
    <a href="index.html" class="nav__logo" aria-label="Home">
      <!--
        Export your AS monogram from Figma as a PNG or SVG and save it to:
        assets/images/as-logo.png
      -->
      <img src="assets/images/as-logo.png" alt="AS">
    </a>
    <ul class="nav__links">
      <li><a href="index.html"   class="nav__link nav__link--active">Home</a></li>
      <li><a href="projects.html" class="nav__link">Projects</a></li>
      <li><a href="about.html"   class="nav__link">About</a></li>
      <li class="nav__theme-item"><button class="theme-toggle" aria-label="Toggle dark mode">
        <!-- Moon icon (shown in light mode) -->
        <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <!-- Sun icon (shown in dark mode) -->
        <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1"  x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22"   x2="5.64"  y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1"  y1="12" x2="3"  y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22"  y1="19.78" x2="5.64"  y2="18.36"/>
          <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
        </svg>
      </button></li>
    </ul>
    <button class="nav__hamburger" aria-label="Toggle menu" aria-expanded="false">
      <svg class="icon-open" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
      <svg class="icon-close" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </nav>

  <!-- ── Hero ────────────────────────────────────── -->
  <main>
    <section class="hero">
      <div class="page-wrapper hero__inner">

        <!-- Watermark: grows from small -->
        <span class="watermark hero__watermark anim-scale-up"
              id="heroWatermark">
          PORTFOLIO
        </span>

        <!-- Name: glides in from left edge -->
        <h1 class="hero__name"
            id="heroName">  
          Amalia Sörlien
        </h1>

        <!-- Photo: glides in from right edge -->
        <div class="hero__photo"
             id="heroPhoto">
          <img src="assets/images/hero-photo.png" alt="Amalia Sörlien">
        </div>

      </div>
    </section>
  </main>

  <script src="js/dark-mode.js"></script><!-- DARK MODE: remove this line to disable -->
  <script src="js/nav-indicator.js"></script>
  <script src="js/nav-mobile.js"></script>
  <script src="js/hero-animation.js"></script>
  <script src="js/projects-data.js"></script>
  <script src="js/projects.js"></script>
  <script src="js/about-animation.js"></script>
  <script src="js/router.js"></script>
</body>
</html>
