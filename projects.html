<!DOCTYPE html>

<head>

<script>if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/dark-mode.css"><!-- DARK MODE: remove this line to disable -->
  <script>if (sessionStorage.getItem('anim-projects-done')) document.documentElement.classList.add('js-skip-intro');</script>
  <style id="page-style">
    /* ── Projects page layout ───────────────────── */
    .projects-view {
      position: relative;
      height: 100vh;
      min-height: 832px;
      overflow: hidden;
      background-color: var(--color-white);
    }

    .projects-view__inner {
      position: relative;
      height: 100%;
    }

    /* Large faint "PROJECTS" watermark */
    .projects-view__watermark {
      position: absolute;
      top: 27%;
      left: 0;
      width: 100%;
      text-align: center;
    }

    /* ── Spinning wheel carousel (left side) ─────── */
    .carousel {
      position: absolute;
      top: 0;
      left: 0;
      width: 55%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: translateX(-80px);
    }

    .carousel__item {
      position: absolute;
      left: 0;
      right: 0;
      margin: 0 auto;
      width: 72%;
      opacity: 0; /* hidden until data-pos is set */
      transition:
        transform 1.0s var(--ease-spring),
        filter    1.0s ease,
        opacity   1.0s ease;
    }

    .carousel__item img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── Carousel position states ────────────────── */
    .carousel__item[data-pos="active"] {
      transform: translateX(60px) translateY(50px) scale(1.0);
      filter: blur(0px);
      opacity: 1;
      z-index: 3;
    }

    /* Clean exit — sweeps counter-clockwise off screen upper-left, fully invisible */
    .carousel__item[data-pos="prev"] {
      transform: translateX(-480px) translateY(-380px) scale(0.22);
      filter: blur(12px);
      opacity: 0;
      z-index: 1;
    }

    /* Ghost preview — subtle bottom-left hint of the incoming project */
    .carousel__item[data-pos="next"] {
      transform: translateX(-200px) translateY(290px) scale(0.32);
      filter: blur(14px);
      opacity: 0.35;
      z-index: 2;
    }

    /* Staging: invisible, beyond the exit arc */
    .carousel__item[data-pos="exit-left"] {
      transform: translateX(-700px) translateY(-500px) scale(0.15);
      filter: blur(12px);
      opacity: 0;
      z-index: 1;
    }

    /* Staging: invisible, bottom-left — arcs into ghost position during navigateNext */
    .carousel__item[data-pos="exit-right"] {
      transform: translateX(-400px) translateY(580px) scale(0.12);
      filter: blur(12px);
      opacity: 0;
      z-index: 1;
    }

    /* ── Project info (right side) ───────────────── */
    .project-info-wrap {
      position: absolute;
      top: calc(50% - 80px);
      left: calc(50% + 15px);
    }

    .project-info {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 437px;
    }

    .project-info__meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .project-info__number {
      font-family: var(--font-ui);
      font-weight: 600; /* Inter SemiBold */
      font-size: 16px;
      color: var(--color-black);
    }

    .project-info__title {
      font-family: var(--font-display);
      font-size: var(--text-h1);
      font-weight: 700; /* Thunder Bold */
      line-height: 1;
      color: var(--color-black);
      white-space: nowrap;
    }

    .project-info__body {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .project-info__description {
      font-family: var(--font-body);
      font-size: var(--text-body);
      font-weight: 400;
      line-height: 24px;
      color: var(--color-text-body);
      width: 385px;
    }

    /* ── Title roll ──────────────────────────────── */
    .project-title__wrap {
      display: block;
      overflow: hidden;
      height: 1em; /* matches line-height: 1 on .project-info__title */
      position: relative;
    }
    .project-title__digit {
      position: absolute;
      top: 0;
      left: 0;
      white-space: nowrap;
      line-height: 1;
    }

    /* ── Number odometer ─────────────────────────── */
    .project-number__wrap {
      display: inline-block;
      overflow: hidden;
      height: 1em;
      min-width: 2.2ch;
      vertical-align: text-top;
      position: relative;
      top: 3px;
    }
    .project-number__digit {
      position: absolute;
      top: 0;
      left: 0;
      line-height: 1;
      white-space: nowrap;
    }
  </style>
</head>

  <!-- ── Projects view ───────────────────────────── -->
  <main>
    <section class="projects-view">
      <div class="page-wrapper projects-view__inner">

        <!-- Watermark -->
        <span class="watermark projects-view__watermark anim-scale-up"
              id="projectsWatermark">
          PROJECTS
        </span>

        <!-- Spinning wheel carousel — images injected by projects.js -->
        <div class="carousel" id="projectCarousel">
          <div class="carousel__item" id="carouselA"><img id="carouselImgA" src="" alt=""></div>
          <div class="carousel__item" id="carouselB"><img id="carouselImgB" src="" alt=""></div>
          <div class="carousel__item" id="carouselC"><img id="carouselImgC" src="" alt=""></div>
        </div>

        <!-- Project info — content injected by projects.js -->
        <div class="project-info-wrap">
        <div class="project-info anim-from-right"
             id="projectInfo">
          <div class="project-info__meta">
            <p class="project-info__number" id="projectNumber">Project&nbsp;<span class="project-number__wrap"><span class="project-number__digit" id="projectNumberA"></span><span class="project-number__digit" id="projectNumberB"></span></span></p>
            <h1 class="project-info__title" id="projectTitle"><span class="project-title__wrap"><span class="project-title__digit" id="projectTitleA"></span><span class="project-title__digit" id="projectTitleB"></span></span></h1>
          </div>
          <div class="project-info__body">
            <p class="project-info__description" id="projectDescription"></p>
            <a class="btn btn--primary" id="readMoreBtn" href="#" style="align-self: flex-start;">READ MORE</a>
          </div>
        </div>
        </div>

      </div>
